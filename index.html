document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

out infinite;\"><\u002Fspan>\n      <span style=\"font-family:'DM Sans',sans-serif;font-size:21px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#fff;\">Now Open<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Bricolage Grotesque',serif;font-weight:600;font-size:140px;line-height:0.94;letter-spacing:-0.03em;margin:0;color:#111111;\">Corgi Cafe<\u002Fh1>\n    <p style=\"font-size:34px;line-height:1.32;color:#6B6B6B;margin-top:32px;max-width:720px;text-wrap:balance;\">Buckhead's first 24/7 cafe — the cafe for builders. The best work doesn't stop at <span style=\"color:#111111;font-weight:600;\">5:00<\u002Fspan>, so neither do we.<\u002Fp>\n    <div style=\"margin-top:48px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#111111;padding:15px 30px;border:2px solid #111111;border-radius:9999px;\">Open 24 / 7<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SLIDE 3 — FIND US ============ -->\n  <section data-screen-label=\"Find Us\" style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 96px;text-align:center;transition:opacity 900ms cubic-bezier(0.22,1,0.36,1), transform 900ms cubic-bezier(0.22,1,0.36,1);opacity:{{ op2 }};transform:{{ tf2 }};z-index:{{ z2 }};\">\n    <div style=\"position:relative;width:170px;height:136px;margin-bottom:8px;\">\n      <div style=\"position:absolute;left:50%;top:0;transform:translateX(-50%);display:flex;gap:15px;\">\n        <span style=\"display:block;width:9px;height:36px;border-radius:9999px;background:#A6A6A6;animation:steamRise 2.8s ease-in-out infinite;\"><\u002Fspan>\n        <span style=\"display:block;width:9px;height:36px;border-radius:9999px;background:#A6A6A6;animation:steamRise 2.8s ease-in-out infinite 0.5s;\"><\u002Fspan>\n        <span style=\"display:block;width:9px;height:36px;border-radius:9999px;background:#A6A6A6;animation:steamRise 2.8s ease-in-out infinite 1s;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:104px;height:82px;border-radius:0 0 24px 24px;background:#111111;\"><\u002Fdiv>\n      <div style=\"position:absolute;bottom:20px;left:calc(50% + 50px);width:36px;height:42px;border:10px solid #111111;border-radius:0 20px 20px 0;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'DM Sans',sans-serif;font-size:24px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#6B6B6B;margin-bottom:8px;\">No closing time<\u002Fdiv>\n    <div style=\"font-family:'Bricolage Grotesque',serif;font-weight:700;font-size:300px;line-height:0.84;letter-spacing:-0.04em;color:#D63B2F;font-variant-numeric:tabular-nums;\">24/7<\u002Fdiv>\n    <h2 style=\"font-family:'Bricolage Grotesque',serif;font-weight:600;font-size:70px;line-height:1.02;letter-spacing:-0.025em;margin:44px 0 0;color:#111111;\">Always brewing.<br>Always open.<\u002Fh2>\n    <div style=\"margin-top:44px;display:flex;flex-direction:column;align-items:center;gap:8px;\">\n      <p style=\"font-size:34px;line-height:1.3;color:#111111;font-weight:600;\">Atlanta Tech Village<\u002Fp>\n      <p style=\"font-size:28px;line-height:1.3;color:#6B6B6B;\">3423 Piedmont Rd NE · Buckhead, Atlanta<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:96px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:14px;\">\n      <div style=\"width:14px;height:14px;border-radius:9999px;background:#D63B2F;\"><\u002Fdiv>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:0.16em;text-transform:uppercase;color:#111111;font-weight:600;\">@corgicafe<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <!-- slide dots -->\n  <div style=\"position:absolute;bottom:48px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:25;\">\n    {{ dots }}\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let deg = 90;\n    try {\n      const stored = localStorage.getItem('corgi_rotate');\n      const param = new URLSearchParams(location.search).get('r');\n      if (stored !== null) deg = parseInt(stored, 10);\n      else if (param !== null) deg = parseInt(param, 10);\n    } catch (e) {}\n    if (![0, 90, 180, 270].includes(deg)) deg = 90;\n    this.state = { idx: 0, scale: 1, deg };\n  }\n  SLIDES = 3;\n  DURATION = 7000;\n\n  componentDidMount() {\n    this._fit = () => this.fit();\n    window.addEventListener('resize', this._fit);\n    // press \"r\" to rotate 90° (persists) — for fixing upside-down installs\n    this._key = (e) => {\n      if (e.key === 'r' || e.key === 'R') {\n        const deg = (this.state.deg + 90) % 360;\n        try { localStorage.setItem('corgi_rotate', String(deg)); } catch (e2) {}\n        this.setState({ deg }, () => this.fit());\n      }\n    };\n    window.addEventListener('keydown', this._key);\n    this.fit();\n    this.timer = setInterval(() => {\n      this.setState(s => ({ idx: (s.idx + 1) % this.SLIDES }));\n    }, this.DURATION);\n  }\n  componentWillUnmount() {\n    clearInterval(this.timer);\n    window.removeEventListener('resize', this._fit);\n    window.removeEventListener('keydown', this._key);\n  }\n\n  fit() {\n    const rotated = (this.state.deg === 90 || this.state.deg === 270);\n    const fw = rotated ? 1920 : 1080;\n    const fh = rotated ? 1080 : 1920;\n    const s = Math.min(window.innerWidth / fw, window.innerHeight / fh);\n    this.setState({ scale: s });\n  }\n\n  renderVals() {\n    const idx = this.state.idx;\n    const op = n => (idx === n ? 1 : 0);\n    const tf = n => (idx === n ? 'translateY(0)' : 'translateY(16px)');\n    const z = n => (idx === n ? 5 : 1);\n\n    const progressBar = React.createElement('div', {\n      key: idx,\n      style: {\n        height: '100%', width: '100%', background: '#D63B2F',\n        transformOrigin: 'left center',\n        animation: `fillBar ${this.DURATION}ms linear forwards`\n      }\n    });\n\n    const dots = Array.from({ length: this.SLIDES }, (_, n) =>\n      React.createElement('div', {\n        key: n,\n        style: {\n          width: idx === n ? '36px' : '12px',\n          height: '12px',\n          borderRadius: '9999px',\n          background: idx === n ? '#D63B2F' : 'rgba(17,17,17,0.20)',\n          transition: 'all 400ms cubic-bezier(0.22,1,0.36,1)'\n        }\n      })\n    );\n\n    const out = {\n      progressBar, dots,\n      stageTransform: `translate(-50%, -50%) rotate(${this.state.deg}deg) scale(${this.state.scale})`\n    };\n    for (let n = 0; n < this.SLIDES; n++) {\n      out['op' + n] = op(n);\n      out['tf' + n] = tf(n);\n      out['z' + n] = z(n);\n    }\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
